name: projet_flutter
description: A new Flutter project for personal budget management.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # State Management
  provider: ^6.1.1

  # Architecture & utilitaires
  dartz: ^0.10.1
  equatable: ^2.0.5

  # UI & Formatage
  intl: ^0.20.2
  fl_chart: ^0.65.0

  # Localisation
  flutter_localizations:
    sdk: flutter
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true