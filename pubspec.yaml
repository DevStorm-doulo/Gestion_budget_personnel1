name: projet_flutter
description: A new Flutter project for personal budget management.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # State Management
  provider: ^6.1.1

  # Architecture & utilitaires
  dartz: ^0.10.1
  equatable: ^2.0.5

  # UI & Formatage
  intl: ^0.20.2
  fl_chart: ^0.65.0

  # Localisation
  flutter_localizations:
    sdk: flutter
  google_fonts: ^8.0.2

  # Stockage local
  shared_preferences: ^2.3.0

  # UI Onboarding
  smooth_page_indicator: ^1.1.0

  # Authentification biométrique
  local_auth: ^2.3.0

  # Notifications locales
  flutter_local_notifications: ^17.0.0

  # Export PDF
  pdf: ^3.10.0
  printing: ^5.12.0

  # Export Excel
  excel: ^4.0.0

  # HTTP pour API taux de change
  http: ^1.2.0

  # OCR et reconnaissance de reçus
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
